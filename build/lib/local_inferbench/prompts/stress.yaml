name: stress
description: "High-volume sustained throughput test — 20 long-form generation prompts"
prompts:
  - category: long_generation
    text: "Write a detailed technical tutorial on implementing a B-tree data structure from scratch in Python. Include insertion, deletion, search, and explain the time complexity of each operation."
  - category: long_generation
    text: "Write a comprehensive comparison of microservices vs monolithic architecture. Cover scalability, deployment, testing, team organization, and provide concrete examples of when each is appropriate."
  - category: long_generation
    text: "Explain the complete lifecycle of an HTTP request from the moment a user types a URL in their browser until the page is fully rendered. Include DNS resolution, TCP handshake, TLS, routing, and rendering."
  - category: long_generation
    text: "Write a detailed guide on database indexing strategies for PostgreSQL. Cover B-tree, hash, GiST, and GIN indexes. Include examples of when to use each and how to analyze query plans."
  - category: long_generation
    text: "Describe the process of training a transformer-based language model from scratch. Include data preparation, tokenization, architecture choices, training loop, and evaluation metrics."
  - category: long_generation
    text: "Write a thorough explanation of how garbage collection works in Java, Go, and Python. Compare their approaches, trade-offs, and how each handles memory fragmentation."
  - category: long_generation
    text: "Create a detailed lesson plan for teaching recursion to beginning programmers. Include five progressively harder exercises with solutions and common misconceptions to address."
  - category: long_generation
    text: "Write a comprehensive guide to Linux process management. Cover process creation, scheduling, IPC mechanisms, signals, and demonstrate with practical examples."
  - category: long_generation
    text: "Explain the CAP theorem in distributed systems with three detailed real-world examples showing how different databases make different trade-offs between consistency, availability, and partition tolerance."
  - category: long_generation
    text: "Write a detailed analysis of different sorting algorithms including quicksort, mergesort, heapsort, timsort, and radix sort. Compare their time and space complexity, stability, and real-world performance characteristics."
  - category: long_generation
    text: "Describe the evolution of CPU architecture from single-core to modern multi-core processors. Cover pipelining, branch prediction, out-of-order execution, cache hierarchies, and SIMD instructions."
  - category: long_generation
    text: "Write a comprehensive overview of cryptographic protocols used in modern web security. Cover TLS 1.3, certificate authorities, key exchange mechanisms, and common vulnerabilities."
  - category: long_generation
    text: "Create a detailed guide to container orchestration with Kubernetes. Cover pods, services, deployments, StatefulSets, and demonstrate a complete deployment workflow."
  - category: long_generation
    text: "Explain the internals of a modern compiled programming language. Cover lexing, parsing, AST construction, type checking, optimization passes, and code generation."
  - category: long_generation
    text: "Write a thorough analysis of consensus algorithms in distributed systems. Cover Paxos, Raft, and PBFT with their guarantees, failure modes, and practical implementations."
  - category: long_generation
    text: "Describe the complete architecture of a modern web browser rendering engine. Cover HTML parsing, CSS layout, painting, compositing, and JavaScript execution."
  - category: long_generation
    text: "Write a detailed guide to implementing a key-value store with ACID transactions. Cover the write-ahead log, buffer pool management, concurrency control, and crash recovery."
  - category: long_generation
    text: "Explain how modern GPUs work from an architectural perspective. Cover CUDA cores, memory hierarchy, warp scheduling, and how this relates to parallel programming patterns."
  - category: long_generation
    text: "Create a comprehensive overview of machine learning model deployment strategies. Cover model serving, A/B testing, canary deployments, monitoring, and handling model drift."
  - category: long_generation
    text: "Write a detailed explanation of network protocols at each layer of the OSI model. Provide concrete examples of protocols at each layer and explain how data is encapsulated as it moves through the stack."
